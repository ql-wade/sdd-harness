# ================================================
# OpenSpec 项目配置
# Schema: trinity-workflow-v2（三位一体架构工作流 v2）
# ================================================
schema: trinity-workflow-v2

# ================================================
# Trinity 扩展：Context 文件声明
# ================================================
contextFiles:
  - path: openspec/project.md
    description: 项目架构、子模块、设计文档引用
    required: false

# ================================================
# 项目上下文（注入所有产出物）
#
# ⚠️ 重要：此字段应包含项目特定的技术栈和编码规范。
#   不要在此处写入通用工作流说明（那些属于 schema.yaml）。
#   模板是通用的（零技术栈假设），此处负责"我是谁"。
#
# 官方限制: context 最大 50KB。建议控制在 50 行以内。
# ================================================
context: |
  语言：中文（简体）。所有产出物必须用简体中文撰写。

  # ⚠️ 请根据实际项目修改以下内容！
  # Tech stack: [根据你的项目填写，例如]
  # 代码规范: [snake_case / camelCase / PascalCase 等]

# ================================================
# 产出物规则（按 artifact 类型）
# ================================================
rules:
  proposal:
    - 字数控制在 500 字以内
    - 必须包含 Non-goals 章节
    - 必须提供 2-3 个方案选项
    - 必须定义成功指标
  design:
    - 必须包含架构图
    - 必须列出风险与缓解措施
    - 必须说明 Breaking Changes
  specs:
    - 使用 Given/When/Then Gherkin 格式
    - 覆盖 Happy Path、Edge Cases、Error Cases
  tasks:
    - 每个任务 2-5 分钟可完成
    - 每个任务有明确的验证步骤
    - 任务按批次（Batch）组织

# ================================================
# Trinity Skills 配置
# ================================================
trinity:
  enabled: true

  skills:
    new:
      trigger: "/trinity:new"
      file: "trinity-new/SKILL.md"
      description: "创建新变更（带追踪）"

    continue:
      trigger: "/trinity:continue"
      file: "trinity-continue/SKILL.md"
      description: "继续变更（带追踪）"

    apply:
      trigger: "/trinity:apply"
      file: "trinity-apply/SKILL.md"
      description: "执行任务（带追踪）"

    verify:
      trigger: "/trinity:verify"
      file: "trinity-verify/SKILL.md"
      description: "验证变更（带追踪）"

    archive:
      trigger: "/trinity:archive"
      file: "trinity-archive/SKILL.md"
      description: "归档变更"

    ff:
      trigger: "/trinity:ff"
      file: "trinity-ff/SKILL.md"
      description: "快速流程（带追踪）"

# ================================================
# 追踪文件配置
# ================================================
tracking:
  templates_dir: "trinity-workflow/templates"
  auto_update: true
  files:
    - task_plan.md
    - findings.md
    - progress.md
    - delta-log.md

# ================================================
# Profile 模式配置
# ================================================
profiles:
  quick:
    description: "快速模式 - 适用于单文件修改、Bug Fix"
    artifacts: [proposal, tasks]
    estimated_time: "30min"

  core:
    description: "核心模式 - 适用于新功能、多文件变更"
    artifacts: [proposal, specs, design, tasks]
    estimated_time: "1-2h"

  expanded:
    description: "扩展模式 - 适用于复杂功能、跨模块、架构重构"
    artifacts: [proposal, specs, design, tasks, verify]
    estimated_time: "2-4h"

  autoSelect:
    enabled: true
    rules:
      - condition: "single_file AND bug_fix"
        profile: quick
      - condition: "multi_file OR new_feature"
        profile: core
      - condition: "cross_module OR refactor OR complex"
        profile: expanded
