# SDD Harness 运行时配置
# 项目身份/技术栈/决策原则 → .sdd/steering/project.md（单一真相）
# OpenSpec/Trinity 配置 → openspec/config.yaml（不在此重复）

sdd:
  version: "0.1.0"

  # 项目身份来源（单一指针，不重复内容）
  project_file: .sdd/steering/project.md

  # Stage workflow
  stages: [grill, product, dev, test, code, review, verify, release, archive]
  stage_default: grill

  # Hooks
  hooks:
    mvp: [SessionStart, PreToolUse, Stop, PreCompact, SubagentStop]
    override: "touch .sdd/hooks/bypass"
    block_log: ".sdd/hooks/block-log.md"

  # Review
  review:
    architecture: superpowers-code-reviewer
    line_level: open-code-review
    auto_debug_after_rejections: 2

  # Knowledge
  knowledge:
    backend: llmwiki-mcp
    sediment_on: archive

  # MCP keys
  mcp_keys_file: "~/.sdd/mcp-keys.env"

  # Domain registry
  domain_registry:
    enabled: false
    domains: []
